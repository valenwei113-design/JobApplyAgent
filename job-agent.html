<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Track Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f8f9fc;
      height: 100vh;
      display: flex;
      overflow: hidden;
      color: #111827;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 320px;
      min-width: 320px;
      background: #ffffff;
      border-right: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      gap: 16px;
      overflow-y: auto;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .logo-text { font-size: 15px; font-weight: 600; color: #111827; }
    .logo-sub  { font-size: 11px; color: #9ca3af; margin-top: 1px; }

    .divider { height: 1px; background: #f3f4f6; }

    .section-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      color: #9ca3af;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* Stat row */
    .stat-row { display: flex; gap: 8px; }

    .stat-card {
      flex: 1;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
    }

    .stat-value { font-size: 20px; font-weight: 700; color: #111827; line-height: 1; }
    .stat-label { font-size: 10px; color: #9ca3af; margin-top: 4px; }

    /* Charts */
    .chart-block { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; }
    .chart-block canvas { max-height: 140px; }

    /* Suggestions */
    .suggestions { display: flex; flex-direction: column; gap: 5px; }

    .suggestion {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 9px 11px;
      font-size: 12px;
      color: #374151;
      cursor: default;
      transition: all 0.15s;
    }

    .suggestion:hover {
      background: #eef2ff;
      border-color: #c7d2fe;
      color: #4f46e5;
    }

    .powered {
      margin-top: auto;
      padding-top: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #d1d5db;
    }

    .powered span { color: #9ca3af; font-weight: 500; }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #f8f9fc;
    }

    .topbar {
      padding: 16px 24px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #ffffff;
    }

    .topbar-title { font-size: 15px; font-weight: 600; color: #111827; }
    .topbar-sub   { font-size: 12px; color: #9ca3af; margin-top: 2px; }

    .status-dot {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #6b7280;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 6px #10b981;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .chat-container { flex: 1; overflow: hidden; }
    .chat-container iframe { width: 100%; height: 100%; border: none; }

    @media (max-width: 768px) { .sidebar { display: none; } }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">🔍</div>
      <div>
        <div class="logo-text">JobTrack AI</div>
        <div class="logo-sub">Powered by DeepSeek + Dify</div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Live stats -->
    <div>
      <div class="section-title">Overview</div>
      <div class="stat-row">
        <div class="stat-card">
          <div class="stat-value" id="val-total">—</div>
          <div class="stat-label">Applications</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="val-pending">—</div>
          <div class="stat-label">Pending</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="val-countries">—</div>
          <div class="stat-label">Countries</div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Feedback pie -->
    <div>
      <div class="section-title">Feedback Status</div>
      <div class="chart-block">
        <canvas id="chartFeedback"></canvas>
      </div>
    </div>

    <!-- Country bar -->
    <div>
      <div class="section-title">Top Countries</div>
      <div class="chart-block">
        <canvas id="chartCountries"></canvas>
      </div>
    </div>

    <div class="powered">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      Real-time · <span>Live DB</span>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title">Job Track Assistant</div>
        <div class="topbar-sub">Ask anything about your applications or work permits</div>
      </div>
      <div class="status-dot"><div class="dot"></div>Online</div>
    </div>
    <div class="chat-container">
      <iframe src="http://localhost/chatbot/aPeOSTemhgI3UTkK" allow="microphone"></iframe>
    </div>
  </main>

<script>
const API = 'http://localhost:8000';

async function loadStats() {
  const s = await fetch(`${API}/stats/summary`).then(r => r.json());
  document.getElementById('val-total').textContent     = s.total;
  document.getElementById('val-pending').textContent   = s.pending;
  document.getElementById('val-countries').textContent = s.countries;
}

async function loadFeedbackChart() {
  const d = await fetch(`${API}/stats/feedback`).then(r => r.json());
  new Chart(document.getElementById('chartFeedback'), {
    type: 'doughnut',
    data: {
      labels: ['Pending', 'Rejected'],
      datasets: [{
        data: [d.pending, d.rejected],
        backgroundColor: ['#6366f1', '#f87171'],
        borderWidth: 0,
        hoverOffset: 4
      }]
    },
    options: {
      plugins: { legend: { position: 'bottom', labels: { font: { size: 11 }, color: '#6b7280', boxWidth: 12 } } },
      cutout: '65%'
    }
  });
}

async function loadCountriesChart() {
  const data = await fetch(`${API}/stats/countries`).then(r => r.json());
  new Chart(document.getElementById('chartCountries'), {
    type: 'bar',
    data: {
      labels: data.map(d => d.location),
      datasets: [{
        data: data.map(d => d.count),
        backgroundColor: '#6366f1',
        borderRadius: 4,
        borderSkipped: false
      }]
    },
    options: {
      indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10 }, color: '#9ca3af' } },
        y: { grid: { display: false }, ticks: { font: { size: 10 }, color: '#374151' } }
      }
    }
  });
}

loadStats();
loadFeedbackChart();
loadCountriesChart();


</script>
</body>
</html>
